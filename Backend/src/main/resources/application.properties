spring.application.name=restaurant_ordering_system

# Database Configuration - Use environment variables for security
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/food_ordering_platform}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-minimum-32-characters}
jwt.expiration=3600000

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.org.example.restaurant_system=INFO

